---
- name: Clone oh-my-zsh
  git:
    repo: "{{ github }}robbyrussell/oh-my-zsh.git"
    dest: "{{ omzsh_dir }}"
    accept_hostkey: yes

- name: Check if omzsh is installed
  stat:
    path: "{{ omzsh_dir }}"
  register: omzsh

- name: Install oh-my-zsh
  shell: "{{ omzsh_dir }}/tools/install.sh"
  when: not omzsh.stat.exists

- name: Cloning custom plugins
  git:
    repo: "{{ github }}{{ item.value }}/{{ item.key }}.git"
    dest: "{{ omzsh_plugins_dir }}/{{ item.key }}"
    accept_hostkey: yes
  with_dict: "{{ omzsh_plugins }}"

- name: Create .zshrc
  template:
    src: .zshrc.j2
    dest: "{{ user.home }}/.zshrc"
    backup: true
  when: not skip_config_tasks

- name: Create update.zsh script
  template:
    src: update.zsh.j2
    dest: "{{ omzsh_custom_dir }}/update.zsh"
    backup: true
  when: not skip_config_tasks

- name: Create utils.zsh script
  copy:
    src: utils.zsh
    dest: "{{ omzsh_custom_dir }}/utils.zsh"
    backup: true
  when: not skip_config_tasks

- name: Ensure .config directory exists
  file:
    path: "{{ user.home }}/.config"
    state: directory
    mode: "0755"

- name: Create starship.toml
  copy:
    src: starship.toml
    dest: "{{ user.home }}/.config/starship.toml"
    backup: true
  when: not skip_config_tasks
