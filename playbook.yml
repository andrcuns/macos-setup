# Assumes brew bundle has finished and installed all of the software

- hosts: localhost
  roles:
    # Shell
    - { role: zshell, tags: zshell }
    - { role: terminal, tags: terminal }
    
    # Tools
    - { role: mise, tags: mise }

    # LLM
    - { role: llm, tags: llm }

    # Editors
    - { role: neovim, tags: neovim }

    # Window management
    - { role: aerospace, tags: aerospace }
